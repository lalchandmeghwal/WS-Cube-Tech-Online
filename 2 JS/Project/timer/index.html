<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
   
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        h1{
            background: #000;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
    
</head>

<body>

    <h1></h1>

    <script>
        const h1 = document.querySelector('h1');

            setInterval(() => {
                const date = new Date();
                const time = date.toLocaleTimeString();

                h1.innerHTML = time.toUpperCase();
            }, 1000);


            console.log('5'.padStart(2, 0));
    </script>

</body>

</html>
