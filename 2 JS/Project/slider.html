<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Image Slider</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        .slider {
            width: 400px;
            height: 250px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
            border: 2px solid #333;
            border-radius: 10px;
        }

        .slides {
            display: flex;
            width: 100%;
            height: 100%;
            transition: 0.5s;
        }

        .slides img {
            width: 400px;
            height: 250px;
        }

        button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: #333;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }
    </style>
</head>

<body>

    <h2>Image Slider</h2>

    <div class="slider">
        <div class="slides" id="slideContainer">

            <img src="https://images.freecreatives.com/wp-content/uploads/2016/04/Abstract-Website-Background.jpg"
                alt="">
            <img src="https://images.freecreatives.com/wp-content/uploads/2016/04/Beautiful-Plain-Website-Background.jpg"
                alt="">
            <img src="https://tse2.mm.bing.net/th/id/OIP.urhd_k_2LPVWvhnyILpQEQHaEo?pid=ImgDet&w=474&h=296&rs=1&o=7&rm=3"
                alt="">

        </div>

        <button class="prev" onclick="prevSlide()">❮</button>
        <button class="next" onclick="nextSlide()">❯</button>
    </div>

    <script>
        let index = 0;
        const slides = document.getElementById("slideContainer");
        const totalSlides = slides.children.length;

        function showSlide(i) {
            index = (i + totalSlides) % totalSlides;
            slides.style.transform = `translateX(-${index * 400}px)`;
        }

        function nextSlide() {
            showSlide(index + 1);
        }

        function prevSlide() {
            showSlide(index - 1);
        }


        setInterval(() => {
            nextSlide();
        }, 3000);
    </script>

</body>

</html>
