<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop</title>
</head>

<body>

    <script>
        function sumAll(...rest) {
            let sum = 0;
           for(let value of rest){
            sum+=value
           };
           return sum;
        };

        const r = sumAll(1, 2, 3, 4, 5);
        console.log(r)
    </script>

</body>
