<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Animation </title>
    <style>
        * {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    width: 100%;
    background: #286a9c;
}

.bubble1 {
    position: absolute;
    height: 150px;
    width: 150px;
    box-shadow: inset 0px 0px 30px 10px #ccc;
    opacity: 0.5;
    left: 10px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 3s linear infinite;
}

.bubble2 {
    position: absolute;
    height: 100px;
    width: 100px;
    box-shadow: inset 0px 0px 30px 10px #ccc;
    opacity: 0.5;
    left: 200px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 2s linear infinite 2s;
}

.bubble3 {
    position: absolute;
    height: 180px;
    width: 180px;
    box-shadow: inset 0px 0px 30px 10px #ccc;
    opacity: 0.5;
    left: 350px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 4s linear infinite 1s;
}

.bubble4 {
    position: absolute;
    height: 100px;
    width: 100px;
    box-shadow: inset 0px 0px 30px 10px #ccc;
    opacity: 0.5;
    left: 400px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 2s linear infinite 3s;
}

.bubble5 {
    position: absolute;
    height: 150px;
    width: 150px;
    box-shadow: inset 0px 0px 30px 10px #ccc;
    opacity: 0.5;
    left: 550px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 4s linear infinite 4s;
}

.bubble6 {
    position: absolute;
    height: 200px;
    width: 200px;
    box-shadow: inset 0px 0px 30px 10px #ccc;
    opacity: 0.5;
    left: 700px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 2s linear infinite 2s;
}

.bubble7 {
    position: absolute;
    height: 100px;
    width: 100px;
    box-shadow: inset 0px 0px 30px 10px #ccc;
   
    opacity: 0.5;
    left: 800px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 4s linear infinite 4s;
}
.bubble8 {
    position: absolute;
    height: 180px;
    width: 180px;
    box-shadow: inset 0px 0px 30px 10px #ccc;

    opacity: 0.5;
    left: 900px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 3s linear infinite 3s;
}


.bubble9 {
    position: absolute;
    height: 50px;
    width: 50px;
    box-shadow: inset 0px 0px 30px 10px #ccc;

    opacity: 0.5;
    left: 1000px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 2s linear infinite ;
}

.bubble10 {
    position: absolute;
    height: 150px;
    width: 150px;
    box-shadow: inset 0px 0px 30px 10px #ccc;

    opacity: 0.5;
    left: 1150px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 2s linear infinite;
}


.bubble11 {
    position: absolute;
    height: 200px;
    width: 200px;
    box-shadow: inset 0px 0px 30px 10px #ccc;

    opacity: 0.5;
    left: 1150px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 1s linear infinite;
}


.bubble12 {
    position: absolute;
    height: 100px;
    width: 100px;
    box-shadow: inset 0px 0px 30px 10px #ccc;

    opacity: 0.5;
    left: 1400px;
    top: 100%;
    border-radius: 50%;
    animation: bubble 3s linear infinite;
}



@keyframes bubble {
    100% {
        top: 100%;
    }

    100% {
        top: 0;
    }
}
    </style>
</head>

<body>
    <div class="bubble1"></div>
    

    <div class="bubble3"></div>
    <div class="bubble4"></div>

    <div class="bubble5"></div>
    <div class="bubble6"></div>

    <div class="bubble7"></div>
    <div class="bubble8"></div>

    <div class="bubble9"></div>
    <div class="bubble10"></div>


    <div class="bubble11"></div>
    <div class="bubble12"></div>





</body>

</html>
