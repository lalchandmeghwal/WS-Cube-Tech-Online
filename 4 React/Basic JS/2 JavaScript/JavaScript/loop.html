<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/9.0.6/css/intlTelInput.css"/>
    <style>
        .row {
            width: 500px;
            margin: auto;
            padding-top: 50px;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .form-control label {
            width: 100%;

        }

        .form-control select {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
        }

        .form-control input {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
        }
        button{
            background-color: black;
            color: white;
            font-weight: bold;
            border: 0px;
            padding: 15px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <div class="row">
        <form autocomplete="off" id="formHandler">
        <div class="form-control">
            <label>Name</label>
            <input type="text" name="name"/>
        </div>

        <div class="form-control">
            <label>Email</label>
            <input type="text" name="email"/>
        </div>

        <div class="form-control">
            <label>Mobile Number</label>
            <input type="text" name="mobile_number" id="mobile_number"/>
        </div>

        <div class="form-control">
            <label>Select Country</label>
            <select id="country" name="country_name">
                <option value="">Select Country</option>
                <option value="1">India</option>
                <option value="2">SriLanka</option>
            </select>
        </div>
        <div class="form-control">
            <label>Select State</label>
            <select id="state" name="state_name">
                <option>Select State</option>
            </select>
        </div>

        <button type="submit">
            Submit
        </button>
        </form>
    </div>


    <div class="row">
        <table border="2" cellspacing="0" cellpadding="10">
            <thead>
                <tr>
                    <th>S.No</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Mobile Number</th>
                    <th>Country Name</th>
                    <th>State Name</th>
                </tr>
            </thead>
            <tbody id="userData">
                
            </tbody>
        </table>


    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/12.0.3/js/intlTelInput.js"></script>

    <script>
        $("#mobile_number").intlTelInput({
            initialCountry: "IN",
            separateDialCode: false,
            formatOnDisplay: true,
            //nationalMode: false,
            // allowDropdown: false,
        });
    </script>

    <script>
        var states = [
            { "country_id": 1, "state": "Maharashtra" },
            { "country_id": 1, "state": "Rajasthan" },
            { "country_id": 1, "state": "Tamil Nadu" },
            { "country_id": 1, "state": "Karnataka" },
            { "country_id": 1, "state": "Uttar Pradesh" },

            { "country_id": 2, "state": "Western Province" },
            { "country_id": 2, "state": "Central Province" },
            { "country_id": 2, "state": "Southern Province" },
            { "country_id": 2, "state": "Northern Province" },
            { "country_id": 2, "state": "Eastern Province" }
        ]


        document.getElementById('country').addEventListener('change', (event) => {

            var finalStates = [];

            if(event.target.value != ''){
                finalStates = states.filter((v) => {
                    if(v.country_id == event.target.value){
                        return v;
                    }
                })
            }

            var getStates = '<option>Select State</option>';

            finalStates.forEach((v) => {
                // getStates += '<option>'+ v.state  +'</option>';

                getStates += `<option> ${ v.state } </option>`;


                var text = '<div class="form-control"><label>Select Country</label><select id="country" name="country_name"><option value="">Select Country</option><option value="1">India</option><option value="2">SriLanka</option></select></div>';

                var text = `<div class="form-control">
                    <label>Select Country</label>
                    <select id="country" name="country_name">
                        <option value="">Select Country</option>
                        <option value="1">India</option>
                        <option value="2">SriLanka</option>
                    </select>
                </div>`;
            })

            document.getElementById('state').innerHTML = getStates;

        })

        var getUserInfo = JSON.parse(localStorage.getItem('user_info'));
        var allUserData = getUserInfo ? getUserInfo : [];

        document.getElementById('formHandler').addEventListener('submit', (event) => {
            event.preventDefault();

            const data = {
                name : event.target.name.value,
                email : event.target.email.value,
                mobile_number : event.target.mobile_number.value,
                country_name : event.target.country_name.value,
                state_name : event.target.state_name.value,
            }

            allUserData = [data, ...allUserData];
            displayData(allUserData);

            localStorage.setItem('user_info' , JSON.stringify(allUserData));
            event.target.reset();

            var getStates = '<option>Select State</option>';
            document.getElementById('state').innerHTML = getStates;

        });

        displayData = (userInfo) => {

            var displayUser = '';

            userInfo.forEach((v,i) => {
                displayUser += `<tr>
                    <td>${ i+1 }</td>
                    <td>${ v.name }</td>
                    <td>${ v.email }</td>
                    <td>${ v.mobile_number }</td>
                    <td>${ v.country_name }</td>
                    <td>${ v.state_name }</td>
                </tr>`
            })

            document.getElementById('userData').innerHTML = displayUser;
        } 


        
        displayData(getUserInfo)
    </script>
</body>

</html>
