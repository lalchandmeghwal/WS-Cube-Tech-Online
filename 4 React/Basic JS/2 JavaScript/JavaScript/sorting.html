    <script>

        var numbers = [5,2,9,13,12,6,1,7];

        //numbers.sort();

        // Asc
        numbers.sort((a, b) => a - b);

        console.log(numbers);

        // Desc
        numbers.sort((a, b) => b - a);

        console.log(numbers);
