<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            list-style: none;
            text-decoration: none;
            font-family: sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 30px;
            box-shadow: 0 0 5px #ccc;
        }

        header nav ul {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header nav ul a {
            color: black;
            font-size: 20px;
        }

        .menuIcon {
            display: none;
            cursor: pointer;
        }

        @media (width <=750px) {

            header nav ul {
                position: absolute;
                left: -300px;
                top: 0;
                flex-direction: column;
                background: #ccc;
                padding: 10px;
                height: 100vh;
                width: 200px;
                padding-top: 2rem;
                transition: all 0.3s linear;
            }

            .menuIcon {
                display: block;
            }

        }



        header nav ul.show {
            left: 0;
        }

        .textarea {
            margin: 2rem auto;
            width: 50%;

            box-shadow: 0 0 5px #ccc;
            padding: 10px;

        }

        .textarea textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            font-size: 20px;
            letter-spacing: 2px;
            outline: none;
        }

        h2 {
            padding: 10px 0;
            letter-spacing: 3px;
        }
    </style>
</head>

<body>

    <header>
        <figure>
            <img width="100px" src="https://smartcitymohaliplots.realtynivesh.com/Logo.svg" alt="">
        </figure>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Content</a></li>
                <li><a href="#">course</a></li>
                <li><a href="#">gallery</a></li>
                <li><a href="#">help</a></li>
            </ul>
        </nav>
        <i class="fa-solid fa-bars menuIcon"></i>

    </header>


    <div class="textarea">

        <textarea name="" id="textarea" placeholder="Enter the Message"></textarea>
        <h2>Length- <span id="output">0</span></h2>
        <p></p>
    </div>


    <script>

        const menuIcon = document.querySelector('.menuIcon');
        const ul = document.querySelector('header nav ul');
        const textarea = document.querySelector('#textarea');
        const output = document.querySelector('#output');
        const p = document.querySelector('p');
        console.log(textarea, output);

        menuIcon.addEventListener('click', () => {
            menuIcon.classList.toggle('fa-bars');
            menuIcon.classList.toggle('fa-x');
            ul.classList.toggle('show');

        });


        textarea.addEventListener('input', () => {
            console.log(textarea.value);
            p.innerHTML = textarea.value;


            output.innerHTML = textarea.value.length;



        })
    </script>
</body>

</html>
