<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Animation</title>
    <style>
        * {

    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body{
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box{
    background: #646464;
    height: 100px;
    width: 100px;
    animation: box 3s linear infinite 1s;
}

@keyframes box {
    0%{
        rotate: 0deg;
    }
    100%{
        rotate: 360deg;
        
    }
}
    </style>
</head>

<body>
    <div class="box">

    </div>
</body>

</html>
