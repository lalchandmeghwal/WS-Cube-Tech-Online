<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #070c1a;
            position: fixed;

        }

        .container {
            position: relative;

            border-radius: 50%;
        }

        .part1 {
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 2px solid #ccc;
            position: relative;
            animation: rotate 10s linear infinite;
            opacity: 0.5;
        }

        .part1::after {

            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            background: #9a7e7e;
            top: 0;
            border-radius: 50%;
            left: 162px;
        }

        .part1::before {

            content: '';
            width: 35px;
            height: 35px;
            position: absolute;
            top: -7px;
            border-radius: 50%;
            left: 153px;
            border: 2px solid #f1eded;
            transform: scaleX(0.5);
            z-index: 1000;

        }

        .part2 {
            width: 450px;
            height: 450px;
            border-radius: 50%;
            border: 2px solid #ccc;

            position: absolute;
            top: 25px;
            left: 25px;

            animation: rotate 5s linear infinite;
        }

        .part2::before {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            background: #9a7e7e;
            top: 0;
            border-radius: 50%;
            left: 142px;
        }

        .part3 {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid #ccc;

            position: absolute;
            top: 50px;
            left: 50px;

            animation: rotate 3s linear infinite;
        }

        .part3::before {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            background: #d05454;
            top: 0;
            border-radius: 50%;
            left: 125px;
        }

        .part4 {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 2px solid #ccc;

            position: absolute;
            top: 75px;
            left: 75px;

            animation: rotate 8s linear infinite;
        }

        .part4::before {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            background: rgb(78, 78, 222);
            top: 0;
            border-radius: 50%;
            left: 104px;
        }


        .part5 {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid #ccc;

            position: absolute;
            top: 100px;
            left: 100px;

            animation: rotate 3s linear infinite;
        }

        .part5::before {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            background: rgb(203, 203, 58);
            top: 0;
            border-radius: 50%;
            left: 82px;
        }



        .part6 {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 2px solid #ccc;

            position: absolute;
            top: 125px;
            left: 125px;

            animation: rotate 8s linear infinite;
        }

        .part6::before {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            background: white;
            top: 0;
            border-radius: 50%;
            left: 65px;
        }

        .part7 {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid #ccc;

            position: absolute;
            top: 150px;
            left: 150px;

            animation: rotate 5s linear infinite;
        }

        .part7::before {
            content: '';
            width: 20px;
            height: 20px;
            position: absolute;
            background: pink;
            top: 0;
            border-radius: 50%;
            left: 47px;
        }

        .part8 {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            /* border: 2px solid #ccc; */
            background: #c0962a;
            box-shadow: 0px 0px 150px 100px #a78327;

            position: absolute;
            top: 200px;
            left: 200px;
            z-index: -1;

            /* animation: rotate 5s linear infinite; */
        }



        @keyframes rotate {
            0% {
                rotate: 0deg;
            }

            100% {
                rotate: 360deg;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="part1"></div>
        <div class="part2"></div>
        <div class="part3"></div>
        <div class="part4"></div>
        <div class="part5"></div>
        <div class="part6"></div>
        <div class="part7"></div>
        <div class="part8"></div>
    </div>
</body>

</html>
